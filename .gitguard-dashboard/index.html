<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitGuard Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { background: #161b22; padding: 20px; border-bottom: 1px solid #30363d; margin-bottom: 20px; }
        header h1 { color: #58a6ff; font-size: 24px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
        .stat-card h3 { color: #8b949e; font-size: 14px; margin-bottom: 10px; }
        .stat-card .value { font-size: 32px; font-weight: bold; }
        .critical { color: #f85149; }
        .high { color: #d29922; }
        .medium { color: #e3b341; }
        .low { color: #58a6ff; }
        .findings { background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
        .findings-header { padding: 15px 20px; border-bottom: 1px solid #30363d; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 20px; text-align: left; border-bottom: 1px solid #21262d; }
        th { background: #0d1117; color: #8b949e; font-weight: 600; font-size: 12px; text-transform: uppercase; }
        tr:hover { background: #1c2128; }
        .severity-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .severity-critical { background: #f8514922; color: #f85149; }
        .severity-high { background: #d2992222; color: #d29922; }
        .severity-medium { background: #e3b34122; color: #e3b341; }
        .severity-low { background: #58a6ff22; color: #58a6ff; }
        .rule-id { color: #79c0ff; font-family: monospace; }
        .file-path { color: #8b949e; font-family: monospace; font-size: 13px; }
        .line-num { color: #8b949e; }
        .message { max-width: 400px; }
        .suggestion { color: #3fb950; font-size: 13px; margin-top: 4px; }
        .no-findings { text-align: center; padding: 40px; color: #3fb950; }
        .no-findings h2 { margin-bottom: 10px; }
        .actions { margin-bottom: 20px; display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #30363d; }
        .btn-primary { background: #238636; border-color: #2ea043; color: white; }
        .btn-primary:hover { background: #2ea043; }
        .loading { text-align: center; padding: 40px; color: #8b949e; }
    </style>
</head>
<body>
    <header>
        <h1>GitGuard Security Dashboard</h1>
    </header>
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h3>Total Findings</h3>
                <div class="value" id="total">-</div>
            </div>
            <div class="stat-card">
                <h3>Critical</h3>
                <div class="value critical" id="critical">-</div>
            </div>
            <div class="stat-card">
                <h3>High</h3>
                <div class="value high" id="high">-</div>
            </div>
            <div class="stat-card">
                <h3>Files Scanned</h3>
                <div class="value" id="files">-</div>
            </div>
        </div>
        <div class="actions">
            <button class="btn btn-primary" onclick="scanProject()">Scan Project</button>
            <button class="btn" onclick="exportSARIF()">Export SARIF</button>
            <button class="btn" onclick="exportSBOM()">Export SBOM</button>
        </div>
        <div class="findings">
            <div class="findings-header">Security Findings</div>
            <div id="findings-content">
                <div class="loading">Loading scan results...</div>
            </div>
        </div>
    </div>
    <script>
        async function loadResults() {
            try {
                const response = await fetch('/api/results');
                const data = await response.json();
                updateStats(data);
                updateFindings(data.findings);
            } catch (error) {
                document.getElementById('findings-content').innerHTML =
                    '<div class="no-findings"><h2>No scan results</h2><p>Click "Scan Project" to start</p></div>';
            }
        }
        function updateStats(data) {
            document.getElementById('total').textContent = data.total_findings || 0;
            document.getElementById('critical').textContent = data.critical_count || 0;
            document.getElementById('high').textContent = data.high_count || 0;
            document.getElementById('files').textContent = data.files_scanned || 0;
        }
        function updateFindings(findings) {
            if (!findings || findings.length === 0) {
                document.getElementById('findings-content').innerHTML =
                    '<div class="no-findings"><h2>No security issues found</h2><p>Your code looks clean!</p></div>';
                return;
            }
            let html = '<table><thead><tr><th>Severity</th><th>Rule</th><th>File</th><th>Line</th><th>Message</th></tr></thead><tbody>';
            findings.forEach(f => {
                html += `<tr>
                    <td><span class="severity-badge severity-${f.severity}">${f.severity.toUpperCase()}</span></td>
                    <td class="rule-id">${f.rule_id}</td>
                    <td class="file-path">${f.file_path}</td>
                    <td class="line-num">${f.line_number}</td>
                    <td class="message">${f.message}${f.suggestion ? '<div class="suggestion">' + f.suggestion + '</div>' : ''}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('findings-content').innerHTML = html;
        }
        async function scanProject() {
            document.getElementById('findings-content').innerHTML = '<div class="loading">Scanning...</div>';
            await fetch('/api/scan', { method: 'POST' });
            await loadResults();
        }
        async function exportSARIF() {
            window.location.href = '/api/export/sarif';
        }
        async function exportSBOM() {
            window.location.href = '/api/export/sbom';
        }
        loadResults();
    </script>
</body>
</html>
